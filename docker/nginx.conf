# The path set proxied to the gateway here MUST stay in sync with the same
# list in two other places — drift is silent and only surfaces as a 404 the
# SPA fallback served for a real gateway endpoint:
#
#   - `wranglerProxiedPaths` in apps/web/vite.config.ts (the `vite dev`
#     proxy-to-wrangler-dev topology).
#   - `assets.run_worker_first` in wrangler.example.jsonc (the production
#     Cloudflare Workers topology, where the SPA is served from Workers
#     Static Assets and the listed paths divert to the Worker).
#
# All three describe the same concept: every path the gateway owns; the
# rest is the SPA.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 100m;

  # Shared by every proxied location below. `Upgrade`/`Connection` use the
  # request's own values so non-WS requests get empty strings (harmless) and
  # `GET /responses` / `GET /v1/responses` can upgrade to WebSocket.
  # `proxy_buffering off` is required for SSE streams and long LLM responses;
  # the gateway has no endpoint that benefits from response buffering.
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $http_connection;
  proxy_buffering off;
  proxy_read_timeout 1h;

  # Prefix paths. `/v1/*` covers the OpenAI-style endpoints plus alpha/search.
  location ~ ^/(api|auth|v1|v2|v1beta|jina|voyage|azure-api\.codex)/ {
    proxy_pass http://server:8788;
  }

  # Bare data-plane paths let clients use a root base URL where supported.
  location ~ ^/(alpha/search|completions|chat/completions|responses(/compact)?|messages(/count_tokens)?|embeddings|models|images/(generations|edits))$ {
    proxy_pass http://server:8788;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
